<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>修改气压 · 消防内攻管理</title>
<link rel="stylesheet" href="_shared.css">
<style>
.dim-bg { background: rgba(0,0,0,0.55); position: fixed; inset: 0; z-index: 50; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-radius: 16px 16px 0 0; z-index: 60; max-height: 92%; display: flex; flex-direction: column; }
.sheet .handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 8px auto 0; flex-shrink: 0; }
.sheet .head { padding: 12px 16px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-soft); }
.sheet .head .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; }
.sheet .head .t { flex: 1; }
.sheet .head .t .n { font-size: 15px; font-weight: 600; color: var(--fg); }
.sheet .head .t .r { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
.sheet .head .close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 8px; }
.sheet .scroll { overflow-y: auto; flex: 1; padding-bottom: 16px; }
.delta-box { background: var(--surface); margin: 10px; border-radius: var(--r-md); padding: 14px; }
.delta-box .label-row { display: flex; align-items: center; justify-content: space-between; }
.delta-box .label { font-size: 12px; color: var(--muted); font-weight: 600; }
.delta-box .from { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
.delta-box .from b { color: var(--fg-2); }
.delta-box .row { display: flex; align-items: baseline; gap: 8px; margin-top: 10px; }
.delta-box .num-input { font-size: 40px; font-weight: 700; color: var(--fg); font-family: var(--font-mono); line-height: 1; border-bottom: 2px solid var(--primary); padding-bottom: 4px; min-width: 100px; }
.delta-box .num-input .cursor { color: var(--primary); animation: blink 0.8s infinite; }
@keyframes blink { 50% { opacity: 0; } }
.delta-box .unit { font-size: 16px; color: var(--muted); }
.delta-box .calc { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding: 8px 12px; background: var(--primary-tint); border-radius: var(--r-sm); }
.delta-box .calc .k { font-size: 11px; color: var(--primary-dark); }
.delta-box .calc .v { font-size: 18px; font-weight: 700; font-family: var(--font-mono); color: var(--danger); }
.delta-box .delta-arrow { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--danger); font-family: var(--font-mono); margin-top: 6px; }
.delta-box .delta-arrow.safe { color: var(--success); }
.validation { min-height: 18px; margin-top: 8px; font-size: 11px; color: var(--muted); }
.validation.error { color: var(--danger); font-weight: 700; }
.audit-preview { margin-top: 10px; padding: 9px 10px; border-radius: var(--r-sm); background: #FFF8E1; border: 1px solid #FFE082; font-size: 11px; color: #795B00; line-height: 1.45; }
.section-block { background: var(--surface); margin: 0 10px 10px; border-radius: var(--r-md); padding: 12px 14px; }
.section-block .head-row { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
.task-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.task-grid .opt { padding: 8px; text-align: center; border: 1px solid var(--border); border-radius: var(--r-sm); font-size: 12px; cursor: pointer; background: var(--surface); color: var(--fg-2); }
.task-grid .opt.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; }
.reason-select { width: 100%; height: 42px; border: 1px solid var(--border); border-radius: var(--r-sm); padding: 0 10px; background: var(--surface); color: var(--fg); font-family: inherit; font-size: 14px; }
.loc-row { display: flex; gap: 6px; }
.loc-row input { flex: 1; height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: var(--r-sm); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--fg); }
.loc-row .voice { width: 38px; background: var(--primary-tint); border: 1px solid var(--primary-light); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.loc-row .voice svg { width: 18px; height: 18px; fill: var(--primary-dark); }
.keypad { background: var(--surface); border-top: 1px solid var(--border); padding: 8px; flex-shrink: 0; }
.fixed-summary { background: var(--surface); border-top: 1px solid var(--border); padding: 9px 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
.fixed-summary .item { background: var(--surface-2); border: 1px solid var(--border-soft); border-radius: var(--r-sm); padding: 7px 8px; min-width: 0; }
.fixed-summary .item b { display: block; font-size: 10px; color: var(--muted); font-weight: 600; }
.fixed-summary .item span { display: block; margin-top: 2px; font-size: 13px; color: var(--fg); font-weight: 800; font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fixed-summary .item.risk span { color: var(--danger); font-family: inherit; }
.keypad .grid { display: grid; grid-template-columns: repeat(4,1fr); grid-template-rows: repeat(4,46px); gap: 6px; }
.keypad button { border: 1px solid var(--border); background: var(--surface); border-radius: var(--r-sm); font-size: 18px; font-weight: 500; font-family: var(--font-mono); color: var(--fg); cursor: pointer; }
.keypad button:active { background: var(--bg); }
.keypad button.op { background: var(--surface-2); color: var(--fg-2); font-weight: 600; }
.keypad button.confirm { background: var(--primary); color: #fff; border-color: var(--primary); grid-row: span 2; font-size: 14px; font-weight: 700; font-family: inherit; }
.keypad button.confirm:active { background: var(--primary-dark); }
</style>
</head>
<body>

<iframe src="01-board.html" style="position:fixed;inset:0;width:100%;height:100%;border:0;z-index:0;pointer-events:none"></iframe>
<div class="dim-bg"></div>

<div class="sheet">
  <div class="handle"></div>
  <div class="head">
    <div class="avatar">特</div>
    <div class="t"><div class="n">唐明 · 指挥员</div><div class="r">编号 001 · 已内攻 22:14</div></div>
    <button class="close" onclick="location.href='01-board.html'">✕</button>
  </div>

  <div class="scroll">
    <div class="delta-box">
      <div class="label-row">
        <span class="label">当前气压</span>
        <span class="from">原值 <b>8.4</b> MPa</span>
      </div>
      <div class="row">
        <div class="num-input" id="pressureInput">7.2<span class="cursor">|</span></div>
        <div class="unit">MPa</div>
      </div>
      <div class="delta-arrow" id="deltaText">↓ 1.2 MPa · 较 30s 前下降</div>
      <div class="calc">
        <span class="k">倒计时重算 (38.0 × 7.2 ÷ 30)</span>
        <span class="v" id="countdownText">09 : 07</span>
      </div>
      <div class="validation" id="validationText">允许范围 0.0–30.0 MPa；低于 8.0 MPa 保存前需二次确认。</div>
    </div>

    <div class="section-block">
      <div class="head-row">任务</div>
      <div class="task-grid">
        <div class="opt">侦察</div>
        <div class="opt">破拆</div>
        <div class="opt">灭火</div>
        <div class="opt active">搜救</div>
        <div class="opt">照明</div>
        <div class="opt">排烟</div>
      </div>
    </div>

    <div class="section-block">
      <div class="head-row">内攻位置</div>
      <div class="loc-row">
        <input type="text" value="B 座 12F 西侧楼梯口">
        <button class="voice"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"/></svg></button>
      </div>
    </div>

    <div class="section-block">
      <div class="head-row">修改原因</div>
      <select class="reason-select" id="reasonSelect" aria-label="选择气压修改原因">
        <option value="">请选择原因</option>
        <option value="安全员目视读表">安全员目视读表</option>
        <option value="队员语音回报">队员语音回报</option>
        <option value="NFC 读取异常后手动校正">NFC 读取异常后手动校正</option>
        <option value="紧急撤离前补录">紧急撤离前补录</option>
      </select>
      <div class="audit-preview" id="auditPreview">审计预览：张伟将把唐明气压从 8.4 MPa 改为 7.2 MPa，原因待选择。</div>
    </div>
  </div>

  <div class="fixed-summary" aria-label="保存前固定摘要">
    <div class="item"><b>人员</b><span>唐明 · 001</span></div>
    <div class="item"><b>变化</b><span id="fixedDelta">8.4 → 7.2 MPa</span></div>
    <div class="item"><b>预计剩余</b><span id="fixedTime">09:07</span></div>
    <div class="item risk"><b>保存后果</b><span id="fixedRisk">触发低气压确认</span></div>
  </div>

  <div class="keypad">
    <div class="grid">
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
      <button class="confirm" id="savePressure" type="button">保<br>存</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
      <button class="op" data-key="back">⌫</button>
      <button class="op" data-key=".">.</button>
      <button data-key="0">0</button>
      <button class="op" data-key="clear">C</button>
      <button class="op" data-key="enter">↵</button>
    </div>
  </div>
</div>

<script src="_shared.js"></script>
<script>
injectChrome({nav:false});

const originalPressure = 8.4;
const depletionMinutes = 38.0;
let pressureValue = '7.2';

const pressureInput = document.getElementById('pressureInput');
const deltaText = document.getElementById('deltaText');
const countdownText = document.getElementById('countdownText');
const validationText = document.getElementById('validationText');
const reasonSelect = document.getElementById('reasonSelect');
const auditPreview = document.getElementById('auditPreview');

function formatTime(totalSeconds) {
  const safe = Math.max(0, Math.round(totalSeconds));
  const m = Math.floor(safe / 60);
  const s = safe % 60;
  return String(m).padStart(2, '0') + ' : ' + String(s).padStart(2, '0');
}

function renderPressure() {
  const value = Number(pressureValue || 0);
  const delta = +(value - originalPressure).toFixed(1);
  pressureInput.innerHTML = (pressureValue || '0') + '<span class="cursor">|</span>';
  deltaText.classList.toggle('safe', delta >= 0);
  deltaText.textContent = delta < 0
    ? `↓ ${Math.abs(delta).toFixed(1)} MPa · 较 30s 前下降`
    : `↑ ${delta.toFixed(1)} MPa · 请确认读数来源`;
  countdownText.textContent = formatTime((depletionMinutes * value / 30) * 60);
  document.getElementById('fixedDelta').textContent = `${originalPressure.toFixed(1)} → ${Number.isNaN(value) ? '--' : value.toFixed(1)} MPa`;
  document.getElementById('fixedTime').textContent = countdownText.textContent.replace(/\s/g, '');
  document.getElementById('fixedRisk').textContent = value === 0 ? '阻断：0 MPa 需出场' : (Math.abs(delta) > 8 ? '阻断：跳变过大' : (value < 8 ? '触发低气压确认' : '写入审计并重算'));
  validationText.classList.remove('error');
  if (value < 0 || value > 30 || Number.isNaN(value)) {
    validationText.classList.add('error');
    validationText.textContent = '气压必须在 0.0–30.0 MPa 范围内。';
  } else if (value === 0) {
    validationText.classList.add('error');
    validationText.textContent = '0.0 MPa 不能在此页保存；请走「确认出场」或「紧急撤离」流程。';
  } else if (Math.abs(delta) > 8) {
    validationText.classList.add('error');
    validationText.textContent = '短时间跳变超过 8.0 MPa，需重新读取或由管理员复核后录入。';
  } else if (value < 8) {
    validationText.textContent = '低于 8.0 MPa：保存时将触发高风险二次确认，并写入审计日志。';
  } else {
    validationText.textContent = '范围有效；保存后将重算该员剩余倒计时。';
  }
  auditPreview.textContent = `审计预览：张伟将把唐明气压从 ${originalPressure.toFixed(1)} MPa 改为 ${value.toFixed(1)} MPa，原因：${reasonSelect.value || '待选择'}。`;
}

function inputKey(key) {
  if (key === 'back') pressureValue = pressureValue.slice(0, -1);
  else if (key === 'clear') pressureValue = '';
  else if (key === 'enter') savePressure();
  else if (key === '.' && !pressureValue.includes('.')) pressureValue = pressureValue ? pressureValue + '.' : '0.';
  else if (/^\d$/.test(key) && pressureValue.length < 4) pressureValue += key;
  if (pressureValue.startsWith('00')) pressureValue = '0';
  renderPressure();
}

document.querySelectorAll('[data-key]').forEach(btn => btn.addEventListener('click', () => inputKey(btn.dataset.key)));
reasonSelect.addEventListener('change', renderPressure);
document.getElementById('savePressure').addEventListener('click', savePressure);

function savePressure() {
  const value = Number(pressureValue || 0);
  if (value < 0 || value > 30 || Number.isNaN(value)) {
    validationText.classList.add('error');
    validationText.textContent = '无法保存：气压必须在 0.0–30.0 MPa 范围内。';
    return;
  }
  const delta = +(value - originalPressure).toFixed(1);
  if (value === 0) {
    validationText.classList.add('error');
    validationText.textContent = '无法保存 0.0 MPa：请改用出场确认，避免把失联状态误记为气压修改。';
    return;
  }
  if (Math.abs(delta) > 8) {
    validationText.classList.add('error');
    validationText.textContent = '无法保存：30 秒内气压跳变超过 8.0 MPa，需要管理员复核。';
    return;
  }
  if (!reasonSelect.value) {
    validationText.classList.add('error');
    validationText.textContent = '无法保存：请选择修改原因，便于事后审计。';
    reasonSelect.focus();
    return;
  }
  showBusinessConfirm({
    title: value < 8 ? '确认低气压修改' : '确认修改气压',
    message: '保存后会立即重算倒计时，并把修改原因、操作人、时间写入本场次审计日志。',
    danger: value < 8,
    irreversible: '保存后不会覆盖旧值，系统会追加一条气压修改审计记录。',
    confirmText: '保存并写入审计',
    details: [
      { k: '人员', v: '唐明 · 指挥员 · 编号 001' },
      { k: '气压变化', v: `${originalPressure.toFixed(1)} → ${value.toFixed(1)} MPa` },
      { k: '修改原因', v: reasonSelect.value },
      { k: '倒计时', v: countdownText.textContent.replace(/\s/g, '') }
    ],
    onConfirm: () => {
      showToast('气压已保存 · 审计日志已记录 · 返回看板');
      setTimeout(() => { location.href = '01-board.html'; }, 900);
    }
  });
}

renderPressure();
</script>
</body>
</html>
